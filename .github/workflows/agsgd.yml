name: Sync tunnel.json to Dropbox

on:
  push:
    paths:
      - 'tunnel.json'
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'  # İsteğe bağlı

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: tunnel.json
          sparse-checkout-consistency: false

      - name: Fetch latest tunnel.json
        run: |
          curl -L -o tunnel.json \
            https://raw.githubusercontent.com/senvarken/mizy/refs/heads/main/tunnel.json

      - name: Refresh Dropbox access token
        id: token_refresh
        run: |
          RESPONSE=$(curl -X POST https://api.dropbox.com/oauth2/token \
            -d "grant_type=refresh_token" \
            -d "refresh_token=${{ secrets.DROPBOX_REFRESH_TOKEN }}" \
            -d "client_id=${{ secrets.DROPBOX_APP_KEY }}" \
            -d "client_secret=${{ secrets.DROPBOX_APP_SECRET }}")
          
          ACCESS_TOKEN=$(echo $RESPONSE | jq -r '.access_token')
          echo "access_token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT

      - name: Upload to Dropbox
        run: |
          curl -X POST https://content.dropboxapi.com/2/files/upload \
            --header "Authorization: Bearer ${{ steps.token_refresh.outputs.access_token }}" \
            --header "Dropbox-API-Arg: {\"path\": \"/tunnel.json\", \"mode\": \"overwrite\"}" \
            --header "Content-Type: application/octet-stream" \
            --data-binary @tunnel.json
