name: IPTV Playlist Güncelleme

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install aiohttp
      
      - name: Vavoo kanallarını işle
        run: |
          chmod +x scripts/refresh_vavoo.sh start.sh
          ./scripts/refresh_vavoo.sh
      
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playlist
          publish_branch: gh-pages
